name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: actions/upload-artifact@v7
        with:
          name: obsidian-markgraf
          path: |
            main.js
            manifest.json
            styles.css
            versions.json
          if-no-files-found: error
